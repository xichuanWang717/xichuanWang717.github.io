function fadeAudio(audio, to, duration=1000){
  if(!audio) return Promise.resolve();
  const from=Number.isFinite(audio.volume)?audio.volume:0.5;
  const start=performance.now();
  return new Promise((resolve)=>{
    function step(now){
      const p=Math.min((now-start)/duration,1);
      audio.volume=from+(to-from)*p;
      if(p<1) requestAnimationFrame(step);

    requestAnimationFrame(step);
  });

  playPageSound();
  document.body.classList.add('act45-closing');
  await fadeAudio(bgMusic,0,2500);
  bgMusic.pause();
  bgMusic.currentTime=0;
  await new Promise(r=>setTimeout(r,420));
  systemRestart.classList.add('active');
  await new Promise(r=>setTimeout(r,1250));
  if(loadedModules[current]?.destroy)loadedModules[current].destroy();
  clearScene();
  while(labelRenderer.domElement.firstChild)labelRenderer.domElement.removeChild(labelRenderer.domElement.firstChild);
  ['poster-sub','poster-stat','poster-stat-label','poster-desc'].forEach(id=>{const el=document.getElementById(id);if(el){el.style.display='';delete el.dataset.hiddenBy}});
  current=4;updatePoster(4);updateReel(4);
  const mod=loadedModules[4];
  if(mod?.init)mod.init(scene,camera,controls,renderer,labelRenderer);else if(mod?.default?.init)mod.default.init(scene,camera,controls,renderer,labelRenderer);
  updateLegend(4);
  await restartBackgroundForAct05();
  playProjectorStart();
  await new Promise(r=>setTimeout(r,650));
  systemRestart.classList.remove('active');
  await new Promise(r=>setTimeout(r,220));
  document.body.classList.remove('act45-closing');
  transitioning=false;
}
const MODULE_VERSION='act05-stat-size-weight1';
for(const n of NODES){try{loadedModules.push(await import(`./experiments/${n.file}.js?v=${MODULE_VERSION}`))}catch(e){console.error(`Failed ${n.file}:`,e);loadedModules.push({})}}
let experienceStarted=false;
function startExperience(){
  if(experienceStarted)return;
  experienceStarted=true;
  window.__FRAME_COVER_HIDE__?.();
  playMusic();
  updatePoster(0);
  updateReel(0);
  if(loadedModules[0]?.init)loadedModules[0].init(scene,camera,controls,renderer,labelRenderer);
  else if(loadedModules[0]?.default?.init)loadedModules[0].default.init(scene,camera,controls,renderer,labelRenderer);
  updateLegend(0);
}
window.__FRAME_START_APP__=startExperience;
pagePrev.addEventListener('click',()=>goTo(current-1));
pageNext.addEventListener('click',()=>goTo(current+1));
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')goTo(current-1);if(e.key==='ArrowRight')goTo(current+1);if(e.key==='Enter')startExperience()});
document.getElementById('cover-btn').addEventListener('click',startExperience);
if(window.__FRAME_CLICKED__) startExperience();
function animate(t){requestAnimationFrame(animate);controls.update();loadedModules[current]?.animate?.(t);renderer.render(scene,camera);labelRenderer.render(scene,camera);window.__resolveLabelCollisions?.()}
animate();
</script>
</body>
